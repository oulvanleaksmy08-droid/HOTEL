<!DOCTYPE html> 
<html>
    <head>
        <title>
            sx13
        </title>
    </head>
    <Body>
        <h2 align="center">
            Create Booking
        </h2>
        <form>
            <fieldset>
                <legend>Customer Info:</legend>
                <table>
                  <tr>
                    <td><label> CustomerName:</label></td>
                
                <td><input name="txtCus_name" type="text"></td>
                </tr>
                <tr>
                     <td><label> Customer Tel:</label></td>
                     <td><input name="txtCus_Tel" type="text"
                    placeholder ="type here..."></td>
                </tr>
                <tr>
                    <td><label>Customer Gender:</label></td>
                    <td>
                        <input name="txtCus_Gender"
                        type="radio" value="female">
                        female
                        <input name="txtCus_Gender"
                        type="radio" value="="Male">
                        Male
                <tr>
                    <td><label>Customer id :</label></td>
                    <td><input name="txtCus_Id" type="file"></td>
                </tr>
                <tr>
                    <td><label>Room Number:</label></td>
                    <td>
                        <select name="RoomNum">
                            <option value="R101">101</option>
                            <option value="R102">102</option>
                            <option value="R103">103</option>
                            <option value="R105">105</option>

                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label>Booking date:</label></td>
                    <td><input name="BookingDate" type="date"></td>
                    <tr>
                        <td></td>
                        <td>
                            <input name="submit" type="submit">
                        </td>
                    </tr>
                </tr>
            </fieldset>
        </form>
    </Body>
</html>
