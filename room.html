<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room</title>
    <link rel="icon" href="HTML/logo.jpg">
</head>
<body leftmargin="20" bgcolor="white">
    <h2 align="center">Add New Room</h2>
    <form>
        <fieldset>
            <table>
               <tr>
                <td><label>Room Number:</label></td>
                <td><input type="Number" name="txtRmNum"></td>
                </tr>
                <tr>
                    <td><label>Room Price:</label></td>
                    <td><input type="text" name="txtRmPrice"></td>
                </tr>
                <tr>
                    <td><label>Room Note:</label></td>
                    <td><textarea name="txtRmNote" cols="30" rows="10"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="Insert"></td>
                </tr> 
            </table>
            
        </fieldset>
    </form>
</body>
</html>
